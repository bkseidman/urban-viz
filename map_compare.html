<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Map Comparison</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 40px;
        line-height: 1.4;
      }

      h1 {
        margin-bottom: 6px;
      }

      .note {
        color: #444;
        margin-bottom: 20px;
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 30px;
        align-items: start;
      }

      .panel h2 {
        margin-top: 0;
        margin-bottom: 10px;
        font-size: 22px;
      }

      svg {
        background: #f5f5f5;
        display: block;
      }

      .legend text {
        font-size: 12px;
      }
    </style>
  </head>

  <body>
    <h1>Map Comparison</h1>
    
    <div class="grid">
      <div class="panel">
        <h2>Simplified Map</h2>
        <svg id="map-simple" width="620" height="620"></svg>
      </div>

      <div class="panel">
        <h2>Detailed Map</h2>
        <svg id="map-detailed" width="620" height="620"></svg>
      </div>
    </div>

    <p><a href="index.html">Back to index</a></p>

    <script src="js/map_compare.js"></script>
  </body>
</html>
