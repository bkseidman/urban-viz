<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Street Sweeping Map</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>

    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 40px;
        line-height: 1.4;
      }

      h1 {
        margin-bottom: 6px;
      }

      .note {
        color: #444;
        margin-bottom: 20px;
      }

      .map-layout {
        display: flex;
        gap: 24px;
        align-items: flex-start;
      }

      svg {
        display: block;
        background: #f8f8f8;
      }

      .legend text {
        font-size: 12px;
      }

      .overlay {
        cursor: pointer;
      }

      .overlay.selected {
        stroke: #000;
        stroke-width: 4px;
        opacity: 1;
      }

      #detail-panel {
        width: 280px;
        min-height: 220px;
        padding: 18px;
        border: 1px solid #ccc;
        border-radius: 8px;
        background: white;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      #detail-panel h2 {
        margin-top: 0;
        margin-bottom: 10px;
        font-size: 20px;
      }

      #detail-panel p {
        margin: 8px 0;
      }

      #detail-panel .hint {
        color: #555;
      }

      #map-tooltip {
        position: absolute;
        display: none;
        pointer-events: none;
        background: white;
        border: 1px solid #999;
        border-radius: 6px;
        padding: 8px 10px;
        font-size: 13px;
        line-height: 1.4;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        max-width: 240px;
        z-index: 10;
      }
    </style>
  </head>

  <body>
    <h1>Street Sweeping Frequency Map</h1>

    <p class="note">
      Street segments are colored by grouped monthly sweeping frequency.
      Hover over a colored street segment for a quick tooltip, or click a street
      to view its details.
    </p>

    <div class="map-layout">
      <svg id="map" width="1000" height="800"></svg>

      <div id="detail-panel">
        <h2>Selected Street</h2>
        <p class="hint">Click a colored street segment to view its sweeping information.</p>
      </div>
    </div>

    <div id="map-tooltip"></div>

    <p><a href="index.html">Back to index</a></p>

    <script src="js/map.js"></script>
  </body>
</html>
